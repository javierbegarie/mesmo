server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # TanStack Router uses client-side routes (e.g. /candidates/:id) — fall
    # back to index.html so a direct hit or refresh on a deep link works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
